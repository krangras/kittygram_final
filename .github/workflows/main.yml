name: Kittygram Workflow

on:
  push:
    branches:
      - main

jobs:
  # 1. Тестирование
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -r ./backend/requirements.txt
      - name: Lint with ruff
        run: ruff check ./backend
      - name: Test backend
        run: |
          cd backend/
          python manage.py test

  # 2. Сборка и отправка образов на Docker Hub
  build_and_push_to_docker_hub:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker 
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      # Сборка бэкенда
      - name: Push backend to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./backend/
          push: true
          # Используем переменную секрета, она подставится автоматически
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest

      - name: Push frontend to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest

      - name: Push gateway to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./nginx/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest


      # Сборка nginx (gateway)
      - name: Push gateway to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./nginx/
          push: true
          tags: krangarspro@gmail.com/kittygram_gateway:latest

  # 3. Уведомление в Telegram
  send_message:
    runs-on: ubuntu-latest
    needs: build_and_push_to_docker_hub
    steps:
      - name: Send message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Деплой Kittygram успешно выполнен!
            Автор: ${{ github.actor }}
            Коммит: ${{ github.event.commits[0].message }}
